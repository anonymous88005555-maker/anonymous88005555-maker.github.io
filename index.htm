            transition: all 0.3s ease;

        .card-hover:hover {

        }
        
        .video-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 50%);
        }
        
        .thumbnail-container {
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
        }
        
        .thumbnail-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(229, 9, 20, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .thumbnail-container:hover .play-button {
            opacity: 1;
        }
        
        .category-pill {
            transition: all 0.2s ease;
        }
        
        .category-pill:hover {
            transform: scale(1.05);
        }
        
        .category-pill.active {
            background: linear-gradient(90deg, #e50914 0%, #ff6a6a 100%);
            color: white;
        }
        
        .premium-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(229, 9, 20, 0.9);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            z-index: 10;

        .duration-badge {
            position: absolute;
            bottom: 10px;

            padding: 2px 6px;

            font-size: 12px;
            z-index: 10;
        }
        
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        
        .glow-effect {
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
        }
        
        .navbar-bg {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
        }
        
        .featured-video {
            position: relative;
            height: 500px;
            overflow: hidden;
        }
        
        .featured-video img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .featured-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.7) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2rem;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
        
        .video-post {
            background-color: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .video-post:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
        }
        
        .video-post-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            line-height: 1.4;
        }
        
        .video-post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #9ca3af;
            font-size: 0.875rem;
            padding: 0 1rem 1rem;
        }
        
        .video-post-meta span {
            margin-right: 1rem;
        }
        
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            height: 100%;
            background: #1a1a1a;
            z-index: 100;
            transition: right 0.3s ease;
            padding: 2rem;
            overflow-y: auto;
        }
        
        .mobile-menu.active {
            right: 0;
        }
        
        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            display: none;
        }
        
        .mobile-menu-overlay.active {
            display: block;
        }
    </style>
</head>
